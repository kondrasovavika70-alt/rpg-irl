<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RPG IRL 🐾 v9 Telegram Fixed</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root {
            --bg-color: #1e1e24; 
            --card-bg: #2a2a32;  
            --text-color: #e0dcd0; 
            --accent-pink: #ffb7ce; 
            --accent-pink-dark: #ff8da1; 
            --accent-yellow: #fff176; 
            --accent-blue: #4fc3f7; 
            --accent-red: #ff8a80; 
            --accent-green: #81c784; 
            --accent-purple: #ba68c8; 
            --accent-gold: #ffb13d; 
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 15px;
            display: flex;
            justify-content: center;
        }

        .container { width: 100%; max-width: 900px; padding-bottom: 50px; }

        h1 { text-align: center; color: var(--accent-pink); font-size: 1.8rem; margin-bottom: 15px; text-shadow: 0 2px 4px rgba(0,0,0,0.3); }
        h2 { color: var(--accent-pink); font-size: 1.2rem; margin-top: 25px; }

        .profile-card {
            background: var(--card-bg); padding: 20px; border-radius: 20px; display: flex; flex-direction: column; gap: 12px; margin-bottom: 20px; border: 1px solid #3e3e4a; box-shadow: 0 8px 25px rgba(0, 0, 0, 0.4);
        }
        .profile-header-row { display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 10px; }
        .profile-name { font-size: 1.6rem; font-weight: bold; color: var(--accent-pink); margin: 0; }
        .streak-badge { background: linear-gradient(135deg, #ff6b6b, #ff8e53); color: #fff; padding: 6px 12px; border-radius: 12px; font-weight: bold; font-size: 0.85rem; display: inline-flex; align-items: center; gap: 5px; box-shadow: 0 4px 10px rgba(255,107,107,0.3); }
        .profile-title { font-size: 0.9rem; color: var(--accent-pink); font-weight: 600; background: #3a3238; padding: 6px 12px; border-radius: 12px; display: inline-block; border: 1px solid #5a424b; }
        .profile-bio-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(120px, 1fr)); gap: 8px; background: #23232a; padding: 12px; border-radius: 12px; border: 1px dashed #4e3e45; font-size: 0.85rem; color: #cbd5e1; }
        
        /* Жёлтый неон для всех лапок */
        .paw-glow { 
            color: var(--accent-yellow) !important; 
            font-style: normal; 
            display: inline-block; 
            text-shadow: 0 0 10px rgba(255, 241, 118, 0.9), 0 0 20px rgba(255, 241, 118, 0.4); 
        }
        
        .gold-display { color: #ffffff; font-weight: bold; font-size: 1.3rem; background: #4a323a; padding: 8px 16px; border-radius: 25px; border: 1px solid #7a4c5b; white-space: nowrap; }

        .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); gap: 10px; margin-bottom: 25px; }
        .stat-card { background: var(--card-bg); border: 1px solid #3e3e4a; border-radius: 16px; padding: 12px; text-align: center; }
        .stat-card h3 { margin: 0 0 6px 0; font-size: 1rem; }
        .stat-card.int { border-top: 4px solid var(--accent-blue); }
        .stat-card.str { border-top: 4px solid var(--accent-red); }
        .stat-card.end { border-top: 4px solid var(--accent-green); }
        .stat-card.reg { border-top: 4px solid var(--accent-purple); }

        .progress-bar-bg { background: #1e1e24; border-radius: 10px; height: 10px; width: 100%; margin-top: 6px; overflow: hidden; border: 1px solid #333; }
        .progress-bar-fill { height: 100%; width: 0%; transition: width 0.4s ease; }
        .int .progress-bar-fill { background: var(--accent-blue); }
        .str .progress-bar-fill { background: var(--accent-red); }
        .end .progress-bar-fill { background: var(--accent-green); }
        .reg .progress-bar-fill { background: var(--accent-purple); }

        .section-title { border-left: 5px solid var(--accent-pink); padding-left: 10px; text-align: left; font-weight: bold; margin-bottom: 12px; }
        .item-list { background: var(--card-bg); border-radius: 18px; padding: 5px; border: 1px solid #3e3e4a; margin-bottom: 15px; }
        .item-row { display: flex; justify-content: space-between; align-items: center; padding: 12px 10px; border-bottom: 1px solid #34343f; font-size: 0.95rem; }
        .item-row:last-child { border-bottom: none; }

        .btn { color: #1e1e24; border: none; padding: 8px 14px; border-radius: 12px; cursor: pointer; font-weight: bold; font-size: 0.85rem; transition: all 0.2s ease; }
        .btn:active { transform: scale(0.96); }
        .btn-quest { background: var(--accent-pink); }
        .btn-shop { background: var(--accent-gold); }
        .btn-undo { background: #4f4f5a; color: #e0dcd0; padding: 6px 14px; font-size: 0.8rem; border: 1px solid #616170; margin-bottom: 10px; }
        .btn-undo:disabled { opacity: 0.3; cursor: not-allowed; }

        .history-log { background: #23232a; border: 1px dashed #5a424b; border-radius: 16px; padding: 12px; max-height: 120px; overflow-y: auto; font-size: 0.85rem; }
        .log-item { padding: 6px 0; border-bottom: 1px solid #2d2d37; display: flex; justify-content: space-between; }
        .log-gain { color: #81c784; font-weight: bold; }
        .log-loss { color: #ff8a80; font-weight: bold; }

        .achievements-container { max-height: 400px; overflow-y: auto; border: 1px solid #3e3e4a; padding: 12px; border-radius: 20px; background: #23232a; }
        .achievements-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(130px, 1fr)); gap: 10px; }
        .achieve-card { background: var(--card-bg); border: 1px solid #3e3e4a; border-radius: 14px; padding: 10px; text-align: center; position: relative; display: flex; flex-direction: column; align-items: center; justify-content: center; box-shadow: 0 4px 8px rgba(0,0,0,0.15); }
        .achieve-icon { font-size: 1.6rem; margin-bottom: 4px; }
        .achieve-title { font-size: 0.8rem; font-weight: bold; color: #fff; margin-bottom: 2px; }
        .achieve-desc { font-size: 0.65rem; color: #94a3b8; line-height: 1.2; }
        .achieve-count { position: absolute; top: 4px; right: 4px; background: var(--accent-pink); color: #1e1e24; font-size: 0.65rem; font-weight: bold; padding: 1px 4px; border-radius: 6px; }
        .achieve-card.locked { opacity: 0.25; filter: grayscale(1); border: 1px dashed #555; }
        .achieve-card.secret-locked { background: #1a1a20; border: 1px dashed #444; }
        .achieve-card.secret-locked .achieve-title { color: #64748b; }

        .relocation-card { background: #363429; border: 2px solid var(--accent-yellow); border-radius: 20px; padding: 15px; margin-top: 25px; }
        .relocation-header { display: flex; justify-content: space-between; align-items: center; font-weight: bold; color: var(--accent-yellow); font-size: 1.1rem; margin-bottom: 10px; }
        .relocation-progress-bg { background: #1e1e22; border-radius: 12px; height: 18px; width: 100%; overflow: hidden; position: relative; border: 1px solid #444; }
        .relocation-progress-fill { height: 100%; width: 0%; background: linear-gradient(90deg, var(--accent-yellow), #ffd54f); transition: width 0.5s ease; }
        .relocation-percent { position: absolute; width: 100%; text-align: center; top: 0; left: 0; line-height: 18px; font-size: 0.8rem; font-weight: bold; color: #fff; text-shadow: 0 1px 3px rgba(0,0,0,0.8); }
        .btn-add-money { background: var(--accent-yellow); color: #1e1e24; margin-top: 12px; width: 100%; font-size: 0.95rem; padding: 10px; }

</script>
</body>
</html>
